services:
  # Static Site
  - type: web
    name: birthday-slideshow
    env: static
    buildCommand: npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 18
    headers:
      - path: /*
        headers:
          Cache-Control: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
